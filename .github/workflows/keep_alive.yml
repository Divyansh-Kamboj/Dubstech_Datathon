name: Keep Streamlit App Awake

on:
  schedule:
    # Run every 15 minutes to avoid inactivity sleep.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve app URL
        id: app_url
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL || vars.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$STREAMLIT_APP_URL" ]; then
            echo "App URL is not configured. Set STREAMLIT_APP_URL as a secret or variable."
            echo "should_ping=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Normalize trailing slash to build a stable health endpoint.
          BASE_URL="${STREAMLIT_APP_URL%/}"
          echo "should_ping=true" >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "health_url=$BASE_URL/_stcore/health" >> "$GITHUB_OUTPUT"

      - name: Ping Streamlit health endpoint
        if: steps.app_url.outputs.should_ping == 'true'
        run: |
          set -euo pipefail

          HEALTH_URL='${{ steps.app_url.outputs.health_url }}'
          BASE_URL='${{ steps.app_url.outputs.base_url }}'

          echo "Pinging health endpoint: $HEALTH_URL"
          code=$(curl --silent --show-error --output /dev/null \
            --write-out '%{http_code}' \
            --retry 3 --retry-delay 5 --max-time 30 \
            "$HEALTH_URL" || true)

          case "$code" in
            2*|3*)
              echo "Health ping succeeded with HTTP $code"
              exit 0
              ;;
          esac

          echo "Health endpoint returned HTTP $code. Trying base URL once."
          base_code=$(curl --silent --show-error --output /dev/null \
            --write-out '%{http_code}' \
            --retry 2 --retry-delay 5 --max-time 30 \
            "$BASE_URL" || true)

          case "$base_code" in
            2*|3*)
              echo "Base URL ping succeeded with HTTP $base_code"
              exit 0
              ;;
            *)
              echo "Keep-alive ping failed. Health HTTP: $code, Base HTTP: $base_code"
              exit 1
              ;;
          esac

      - name: Skip notice
        if: steps.app_url.outputs.should_ping != 'true'
        run: echo "Skipping keep-alive ping because STREAMLIT_APP_URL is not set."
